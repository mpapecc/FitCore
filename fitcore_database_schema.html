
<style>
#erd { padding: 8px 0; }
#erd svg { width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? 'black' : 'black',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram

  Tenant {
    guid Id PK
    string Name
    string Slug
    datetime CreatedOn
    datetime UpdatedOn
  }

  User {
    guid Id PK
    guid TenantId FK
    string FirstName
    string LastName
    string Email
    string PasswordHash
    enum Role
    bool IsActive
    datetime CreatedOn
    datetime UpdatedOn
  }

  Member {
    guid Id PK
    guid TenantId FK
    guid UserId FK
    string Phone
    string Address
    datetime DateOfBirth
    string EmergencyContact
    datetime CreatedOn
    datetime UpdatedOn
  }

  Trainer {
    guid Id PK
    guid TenantId FK
    guid UserId FK
    string Specialization
    string Bio
    datetime CreatedOn
    datetime UpdatedOn
  }

  MemberTrainer {
    guid Id PK
    guid TenantId FK
    guid MemberId FK
    guid TrainerId FK
    datetime AssignedOn
  }

  MembershipPlan {
    guid Id PK
    guid TenantId FK
    string Name
    decimal Price
    int DurationDays
    string Description
    bool IsActive
    datetime CreatedOn
    datetime UpdatedOn
  }

  MemberMembership {
    guid Id PK
    guid TenantId FK
    guid MemberId FK
    guid PlanId FK
    datetime StartDate
    datetime EndDate
    enum Status
    datetime CreatedOn
    datetime UpdatedOn
  }

  Invoice {
    guid Id PK
    guid TenantId FK
    guid MemberId FK
    guid MembershipId FK
    string InvoiceNumber
    decimal Amount
    datetime IssueDate
    datetime DueDate
    datetime PaidOn
    enum Status
    datetime CreatedOn
    datetime UpdatedOn
  }

  GymClass {
    guid Id PK
    guid TenantId FK
    guid TrainerId FK
    string Name
    enum Type
    int DurationMinutes
    int Capacity
    datetime StartTime
    bool IsRecurring
    datetime CreatedOn
    datetime UpdatedOn
  }

  ClassBooking {
    guid Id PK
    guid TenantId FK
    guid MemberId FK
    guid ClassId FK
    enum Status
    bool IsWaitlist
    datetime BookedOn
    datetime CancelledOn
    datetime CreatedOn
    datetime UpdatedOn
  }

  WorkoutLog {
    guid Id PK
    guid TenantId FK
    guid MemberId FK
    guid TrainerId FK
    string Name
    enum Type
    int DurationMinutes
    int CaloriesBurned
    string TrainerNotes
    int MemberRating
    datetime LoggedOn
    datetime CreatedOn
    datetime UpdatedOn
  }

  Exercise {
    guid Id PK
    guid TenantId FK
    guid WorkoutLogId FK
    string Name
    int Sets
    int Reps
    string Weight
    datetime CreatedOn
    datetime UpdatedOn
  }

  NutritionPlan {
    guid Id PK
    guid TenantId FK
    guid TrainerId FK
    string Name
    enum Goal
    int CalorieTarget
    int ProteinGrams
    int CarbsGrams
    int FatGrams
    datetime CreatedOn
    datetime UpdatedOn
  }

  Meal {
    guid Id PK
    guid TenantId FK
    guid NutritionPlanId FK
    enum MealType
    int TotalCalories
    datetime CreatedOn
    datetime UpdatedOn
  }

  FoodItem {
    guid Id PK
    guid TenantId FK
    guid MealId FK
    string Name
    string Portion
    int Calories
    datetime CreatedOn
    datetime UpdatedOn
  }

  MemberNutritionPlan {
    guid Id PK
    guid TenantId FK
    guid MemberId FK
    guid NutritionPlanId FK
    datetime AssignedOn
  }

  Notification {
    guid Id PK
    guid TenantId FK
    guid SenderId FK
    guid RecipientId FK
    string Title
    string Message
    enum Type
    bool IsRead
    datetime SentOn
    datetime CreatedOn
    datetime UpdatedOn
  }

  Tenant ||--o{ User : "has"
  Tenant ||--o{ MembershipPlan : "has"
  Tenant ||--o{ GymClass : "has"
  Tenant ||--o{ NutritionPlan : "has"
  Tenant ||--o{ Notification : "has"

  User ||--o| Member : "is"
  User ||--o| Trainer : "is"

  Member ||--o{ MemberTrainer : "assigned"
  Trainer ||--o{ MemberTrainer : "assigned"

  Member ||--o{ MemberMembership : "has"
  MembershipPlan ||--o{ MemberMembership : "defines"

  MemberMembership ||--o{ Invoice : "generates"
  Member ||--o{ Invoice : "billed"

  Trainer ||--o{ GymClass : "teaches"
  Member ||--o{ ClassBooking : "books"
  GymClass ||--o{ ClassBooking : "has"

  Member ||--o{ WorkoutLog : "logs"
  Trainer ||--o{ WorkoutLog : "records"
  WorkoutLog ||--o{ Exercise : "contains"

  Trainer ||--o{ NutritionPlan : "creates"
  NutritionPlan ||--o{ Meal : "contains"
  Meal ||--o{ FoodItem : "contains"
  Member ||--o{ MemberNutritionPlan : "assigned"
  NutritionPlan ||--o{ MemberNutritionPlan : "assigned"

  User ||--o{ Notification : "sends"
  User ||--o{ Notification : "receives"
`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
